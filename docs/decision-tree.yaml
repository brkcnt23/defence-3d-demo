# ============================================================
# FİYAT FORMÜLÜ
# ============================================================
pricing:
  formula: |
    base       = material.price_m2 × (width × height / 1_000_000)
    size_adj   = base × sizing.price_multiplier
    mount_adj  = size_adj + mounting.price_addon
    finish_adj = mount_adj × (1 + sum(finishing.price_addon_percent) / 100)
    qty_disc   = finish_adj × quantity × quantity_discount(quantity)
    tax        = qty_disc × 0.20
    total      = qty_disc + tax

  quantity_discount:
    - { min: 1, max: 4, discount: 0 }
    - { min: 5, max: 9, discount: 0.05 }
    - { min: 10, max: 24, discount: 0.10 }
    - { min: 25, max: 49, discount: 0.15 }
    - { min: 50, max: 99, discount: 0.20 }
    - { min: 100, max: null, discount: 0.25 }

  lead_time_formula: |
    base     = material.lead_time_days
    finish   = base + (finishing_count > 0 ? 1 : 0)
    qty      = finish + ceil(quantity / 20)
    mount    = qty + (mounting.type == 'pole_mounted' ? 3 : 0)
    total    = mount

# ============================================================
# KARAR AĞACI KURALLARI (Constraint Engine)
# ============================================================
constraints:
  # Malzeme ← Kullanım Yeri
  - if: "location == outdoor"
    then: "filter materials WHERE outdoor == true"
    message: "Dış mekan için uygun malzemeler listeleniyor..."

  - if: "location == indoor AND product_family == nameplate"
    then: "filter materials WHERE thickness <= 5"
    message: "İsimlik için ince malzemeler..."

  # Montaj ← Ürün Tipi
  - if: "product_family == nameplate"
    then: "allowed mountings: [desktop, wall_mounted]"

  - if: "product_family == plaque"
    then: "allowed mountings: [wall_mounted, desktop]"

  - if: "product_family == display"
    then: "allowed mountings: [freestanding, desktop]"

  # Malzeme ← Montaj
  - if: "mounting == hanging AND weight_kgm2 * area > 5"
    then: "WARNING: Ağırlık 5 kg üzerinde. Askı sistemi güçlendirilmeli."

  - if: "mounting == pole_mounted"
    then: "filter thickness >= 4"
    message: "Direk montaj için minimum 4mm kalınlık gerekli."

  # Ebat ← Malzeme
  - if: "custom_size.w > material.max_size.w OR custom_size.h > material.max_size.h"
    then: "REJECT: Seçilen malzeme bu ebatta üretilemez. Alternatif öner: daha büyük max_size'lı malzeme."

  # Özel İşlem ← Malzeme
  - if: "finishing contains spot_uv AND material.uv_printable == false"
    then: "REJECT: Bu malzemeye UV vernik uygulanamaz."

  # AI Önerileri (soft constraint — warning, not reject)
  ai_suggestions:
    - if: "content.font_size < 8 AND viewing_distance > 2000"
      then: "WARNING: 2 metreden okunamayabilir. Minimum 12 mm yazı önerilir."

    - if: "location == outdoor AND finishing NOT contains uv_resistant"
      then: "WARNING: Dış mekanda UV koruma önerilir. Solma riski."

    - if: "product_family == signage AND content.text_lines >= 4"
      then: "INFO: Çok metinli tabelalar okunurluğu düşürebilir. Sadeleştirme önerilir."

    - if: "material.family == 'pvc_foam' AND location == outdoor AND material.thickness < 10"
      then: "WARNING: İnce PVC köpük dış mekanda deforme olabilir. Kompozit veya 10mm dekota önerilir."

    - if: "mounting == wall_mounted AND material.weight_kgm2 > 8"
      then: "WARNING: Ağır malzeme. Dübel + vida yeterli olmayabilir. Kimyasal dübel öner."
