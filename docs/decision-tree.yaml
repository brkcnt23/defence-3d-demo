# ============================================================
# eBaskicim — Ürün Karar Ağacı (Decision Tree)
# Her düğüm bir karar noktası. Her karar sonraki seçenekleri filtreler.
# ============================================================

meta:
  version: "1.0"
  language: tr
  total_leaf_products: 42  # nihai ürün kombinasyonu sayısı

# ============================================================
# SEVİYE 0: Ürün Ailesi
# ============================================================
product_families:
  - id: signage
    label: "Yönlendirme & Tabela"
    icon: "🪧"
    description: "İç/dış mekan yönlendirme, kurumsal tabela, kapı tabelası"
    children_question: "Ne tür bir tabela istiyorsunuz?"

  - id: plaque
    label: "Plaket & Ödül"
    icon: "🏆"
    description: "Akrilik plaket, kristal ödül, metal plaka"
    children_question: "Ne tür bir plaket düşünüyorsunuz?"

  - id: nameplate
    label: "İsimlik & Rozet"
    icon: "📛"
    description: "Masaüstü isimlik, yaka rozeti, kapı isimliği"
    children_question: "Ne tür isimlik istiyorsunuz?"

  - id: print_product
    label: "Baskı Ürünleri"
    icon: "🎨"
    description: "Kanvas, çerçeveli tablo, vernikli eser, afiş"
    children_question: "Ne tür baskı ürünü istiyorsunuz?"

  - id: display
    label: "Teşhir & Stand"
    icon: "📐"
    description: "Roll-up, x-stand, masaüstü stand, katalog tutucu"
    children_question: "Ne tür teşhir ürünü istiyorsunuz?"

  - id: module
    label: "Modüler Sistem"
    icon: "🧩"
    description: "Değiştirilebilir panolu tabela, modular sergi duvarı"
    children_question: "Ne tür modüler sistem istiyorsunuz?"

# ============================================================
# SEVİYE 1: Kullanım Yeri (her aile için)
# ============================================================
location:
  id: location
  question: "Ürün nerede kullanılacak?"
  type: single_choice
  options:
    - id: indoor
      label: "İç Mekan"
      icon: "🏠"
      affects:
        materials_filter: "outdoor == false OR universal == true"
        thickness_min: 2
        finish_required: false
    - id: outdoor
      label: "Dış Mekan"
      icon: "🌤️"
      affects:
        materials_filter: "outdoor == true"
        thickness_min: 3
        uv_resistant_ink: true
        weatherproof: true
    - id: semi_outdoor
      label: "Yarı Açık (Saçak altı, otopark girişi)"
      icon: "🏗️"
      affects:
        materials_filter: "outdoor == true OR semi_outdoor == true"
        thickness_min: 3

# ============================================================
# SEVİYE 2: Montaj Tipi
# ============================================================
mounting:
  id: mounting
  question: "Nasıl monte edilecek?"
  type: single_choice
  options:
    - id: wall_mounted
      label: "Duvar Montaj"
      icon: "🧱"
      affects:
        back_side: "hidden"         # arkası görünmez
        hardware: ["dübel", "vida", "aynalı askı"]
        price_addon: 0
        3d_context: "wall"          # sahnede duvarda göster
    - id: hanging
      label: "Askılı (Tavandan/Kornişten)"
      icon: "🪝"
      affects:
        hardware: ["çelik halat", "krom boru", "zincir"]
        frame_required: true        # askı için çerçeve şart
        price_addon: 50
        3d_context: "ceiling"
    - id: freestanding
      label: "Ayaklı (Yerde)"
      icon: "🦶"
      affects:
        back_side: "visible"        # arkası da görünür → çift taraflı opsiyonu
        hardware: ["metal ayak", "ahşap sehpa", "ağırlıklı taban"]
        base_required: true
        price_addon: 150
        3d_context: "floor"
    - id: desktop
      label: "Masaüstü"
      icon: "🪑"
      affects:
        hardware: ["akrilik tutucu", "metal ayak", "ahşap blok"]
        size_limited: true
        max_dimensions: { w: 400, h: 300 }
        price_addon: 0
        3d_context: "desk"
    - id: pole_mounted
      label: "Direk Montaj (Yol kenarı)"
      icon: "🚏"
      affects:
        hardware: ["galvaniz direk", "flanj", "beton temel"]
        outdoor: true
        wind_load_calc: true
        price_addon: 500
        3d_context: "pole"

