# ============================================================
# SEVİYE 4: Ebat
# ============================================================
sizing:
  id: sizing
  question: "Hangi ebatta olsun?"
  type: choice_or_custom
  options:
    - id: preset
      label: "Standart Ebatlar"
      type: single_choice
      values:
        - { w: 300, h: 200, label: "A4 Yatay (30×20 cm)", price_multiplier: 1.0 }
        - { w: 200, h: 300, label: "A4 Dikey (20×30 cm)", price_multiplier: 1.0 }
        - { w: 420, h: 297, label: "A3 (42×30 cm)", price_multiplier: 1.8 }
        - { w: 500, h: 350, label: "50×35 cm", price_multiplier: 2.5 }
        - { w: 600, h: 400, label: "60×40 cm", price_multiplier: 3.2 }
        - { w: 700, h: 500, label: "70×50 cm", price_multiplier: 4.5 }
        - { w: 1000, h: 700, label: "100×70 cm", price_multiplier: 7.0 }
        - { w: 1200, h: 800, label: "120×80 cm", price_multiplier: 9.5 }
        - { w: 1500, h: 1000, label: "150×100 cm", price_multiplier: 15.0 }
    - id: custom
      label: "Özel Ebat"
      type: numeric_input
      constraints:
        min: { w: 50, h: 50 }
        max: "{material.max_size}"
        step: 10
      price_multiplier: "area / 0.06"   # A4 alanına göre

# ============================================================
# SEVİYE 5: Baskı İçeriği
